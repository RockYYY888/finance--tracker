services:
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:${ASSET_TRACKER_HOST_REDIS_PORT:-6380}:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    depends_on:
      redis:
        condition: service_healthy
    environment:
      ASSET_TRACKER_API_TOKEN: ${ASSET_TRACKER_API_TOKEN}
      ASSET_TRACKER_APP_ENV: ${ASSET_TRACKER_APP_ENV:-development}
      ASSET_TRACKER_DATABASE_URL: ${ASSET_TRACKER_DATABASE_URL:-}
      ASSET_TRACKER_PUBLIC_ORIGIN: ${ASSET_TRACKER_PUBLIC_ORIGIN}
      ASSET_TRACKER_ALLOWED_ORIGINS: ${ASSET_TRACKER_ALLOWED_ORIGINS:-}
      ASSET_TRACKER_ALLOWED_HOSTS: ${ASSET_TRACKER_ALLOWED_HOSTS:-}
      ASSET_TRACKER_REDIS_URL: ${ASSET_TRACKER_REDIS_URL:-redis://redis:6379/0}
      ASSET_TRACKER_SESSION_SECRET: ${ASSET_TRACKER_SESSION_SECRET}
    restart: unless-stopped
    volumes:
      - ./backend/data:/app/data

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.worker"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      ASSET_TRACKER_API_TOKEN: ${ASSET_TRACKER_API_TOKEN}
      ASSET_TRACKER_APP_ENV: ${ASSET_TRACKER_APP_ENV:-development}
      ASSET_TRACKER_DATABASE_URL: ${ASSET_TRACKER_DATABASE_URL:-}
      ASSET_TRACKER_PUBLIC_ORIGIN: ${ASSET_TRACKER_PUBLIC_ORIGIN}
      ASSET_TRACKER_ALLOWED_ORIGINS: ${ASSET_TRACKER_ALLOWED_ORIGINS:-}
      ASSET_TRACKER_ALLOWED_HOSTS: ${ASSET_TRACKER_ALLOWED_HOSTS:-}
      ASSET_TRACKER_REDIS_URL: ${ASSET_TRACKER_REDIS_URL:-redis://redis:6379/0}
      ASSET_TRACKER_SESSION_SECRET: ${ASSET_TRACKER_SESSION_SECRET}
    restart: unless-stopped
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
        VITE_ENABLE_PWA: "true"
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
    depends_on:
      - backend
      - frontend
    environment:
      ASSET_TRACKER_API_TOKEN: ${ASSET_TRACKER_API_TOKEN}
    ports:
      - "8080:80"
    restart: unless-stopped
