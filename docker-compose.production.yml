services:
  backend:
    environment:
      ASSET_TRACKER_APP_ENV: production
      ASSET_TRACKER_DATABASE_URL: ${ASSET_TRACKER_DATABASE_URL:-postgresql+psycopg://${ASSET_TRACKER_POSTGRES_USER:-asset_tracker}:${ASSET_TRACKER_POSTGRES_PASSWORD:-asset_tracker}@postgres:5432/${ASSET_TRACKER_POSTGRES_DB:-asset_tracker}}
      ASSET_TRACKER_REDIS_URL: ${ASSET_TRACKER_REDIS_URL:-redis://redis:6379/0}

  worker:
    environment:
      ASSET_TRACKER_APP_ENV: production
      ASSET_TRACKER_DATABASE_URL: ${ASSET_TRACKER_DATABASE_URL:-postgresql+psycopg://${ASSET_TRACKER_POSTGRES_USER:-asset_tracker}:${ASSET_TRACKER_POSTGRES_PASSWORD:-asset_tracker}@postgres:5432/${ASSET_TRACKER_POSTGRES_DB:-asset_tracker}}
      ASSET_TRACKER_REDIS_URL: ${ASSET_TRACKER_REDIS_URL:-redis://redis:6379/0}
