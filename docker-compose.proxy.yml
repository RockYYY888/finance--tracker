services:
  backend:
    build:
      extra_hosts:
        - "host.docker.internal=host-gateway"
      args:
        http_proxy: ${ASSET_TRACKER_HTTP_PROXY:-http://host.docker.internal:7890}
        https_proxy: ${ASSET_TRACKER_HTTPS_PROXY:-http://host.docker.internal:7890}
        HTTP_PROXY: ${ASSET_TRACKER_HTTP_PROXY:-http://host.docker.internal:7890}
        HTTPS_PROXY: ${ASSET_TRACKER_HTTPS_PROXY:-http://host.docker.internal:7890}
        no_proxy: ${ASSET_TRACKER_NO_PROXY:-localhost,127.0.0.1,backend,worker,frontend,nginx,redis,postgres}
        NO_PROXY: ${ASSET_TRACKER_NO_PROXY:-localhost,127.0.0.1,backend,worker,frontend,nginx,redis,postgres}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      http_proxy: ${ASSET_TRACKER_HTTP_PROXY:-http://host.docker.internal:7890}
      https_proxy: ${ASSET_TRACKER_HTTPS_PROXY:-http://host.docker.internal:7890}
      HTTP_PROXY: ${ASSET_TRACKER_HTTP_PROXY:-http://host.docker.internal:7890}
      HTTPS_PROXY: ${ASSET_TRACKER_HTTPS_PROXY:-http://host.docker.internal:7890}
      no_proxy: ${ASSET_TRACKER_NO_PROXY:-localhost,127.0.0.1,backend,worker,frontend,nginx,redis,postgres}
      NO_PROXY: ${ASSET_TRACKER_NO_PROXY:-localhost,127.0.0.1,backend,worker,frontend,nginx,redis,postgres}

  worker:
    build:
      extra_hosts:
        - "host.docker.internal=host-gateway"
      args:
        http_proxy: ${ASSET_TRACKER_HTTP_PROXY:-http://host.docker.internal:7890}
        https_proxy: ${ASSET_TRACKER_HTTPS_PROXY:-http://host.docker.internal:7890}
        HTTP_PROXY: ${ASSET_TRACKER_HTTP_PROXY:-http://host.docker.internal:7890}
        HTTPS_PROXY: ${ASSET_TRACKER_HTTPS_PROXY:-http://host.docker.internal:7890}
        no_proxy: ${ASSET_TRACKER_NO_PROXY:-localhost,127.0.0.1,backend,worker,frontend,nginx,redis,postgres}
        NO_PROXY: ${ASSET_TRACKER_NO_PROXY:-localhost,127.0.0.1,backend,worker,frontend,nginx,redis,postgres}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      http_proxy: ${ASSET_TRACKER_HTTP_PROXY:-http://host.docker.internal:7890}
      https_proxy: ${ASSET_TRACKER_HTTPS_PROXY:-http://host.docker.internal:7890}
      HTTP_PROXY: ${ASSET_TRACKER_HTTP_PROXY:-http://host.docker.internal:7890}
      HTTPS_PROXY: ${ASSET_TRACKER_HTTPS_PROXY:-http://host.docker.internal:7890}
      no_proxy: ${ASSET_TRACKER_NO_PROXY:-localhost,127.0.0.1,backend,worker,frontend,nginx,redis,postgres}
      NO_PROXY: ${ASSET_TRACKER_NO_PROXY:-localhost,127.0.0.1,backend,worker,frontend,nginx,redis,postgres}

  frontend:
    build:
      extra_hosts:
        - "host.docker.internal=host-gateway"
      args:
        http_proxy: ${ASSET_TRACKER_HTTP_PROXY:-http://host.docker.internal:7890}
        https_proxy: ${ASSET_TRACKER_HTTPS_PROXY:-http://host.docker.internal:7890}
        HTTP_PROXY: ${ASSET_TRACKER_HTTP_PROXY:-http://host.docker.internal:7890}
        HTTPS_PROXY: ${ASSET_TRACKER_HTTPS_PROXY:-http://host.docker.internal:7890}
        no_proxy: ${ASSET_TRACKER_NO_PROXY:-localhost,127.0.0.1,backend,worker,frontend,nginx,redis,postgres}
        NO_PROXY: ${ASSET_TRACKER_NO_PROXY:-localhost,127.0.0.1,backend,worker,frontend,nginx,redis,postgres}
